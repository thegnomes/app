<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain to Starfield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { background: #000; }
        
        #canvas { 
            position: fixed; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1;
        }
        
        #videoContainer {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            background: #000;
            transition: opacity 0.8s, transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        #brainVideo {
            width: 80vh;
            height: 80vh;
            max-width: 600px;
            max-height: 600px;
            object-fit: contain;
            filter: contrast(1.1) brightness(1.1);
        }
        
        #videoContainer.zoomed {
            opacity: 0;
            transform: scale(3);
            pointer-events: none;
        }
        
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-family: system-ui, sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            z-index: 3;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        
        .hint.hidden { opacity: 0; }
        
        .loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 10;
            transition: opacity 0.5s;
        }
        
        .loading-text {
            color: rgba(255,255,255,0.6);
            font-family: system-ui;
            font-size: 12px;
            letter-spacing: 3px;
        }
        
        /* Fallback brain animation if video fails */
        #fallbackBrain {
            display: none;
            width: 400px;
            height: 400px;
            position: relative;
        }
        
        .brain-layer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(0,200,255,0.3), transparent 50%);
            animation: pulse 3s ease-in-out infinite;
        }
        
        .brain-layer:nth-child(2) {
            animation-delay: -1s;
            background: radial-gradient(circle at 70% 70%, rgba(100,50,255,0.2), transparent 60%);
        }
        
        .brain-layer:nth-child(3) {
            animation-delay: -2s;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.1), transparent 40%);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotate(180deg); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-text">LOADING</div>
    </div>
    
    <div id="videoContainer">
        <video id="brainVideo" autoplay loop muted playsinline poster>
            <source src="brain.mp4" type="video/mp4">
        </video>
        
        <!-- Fallback if video fails -->
        <div id="fallbackBrain">
            <div class="brain-layer"></div>
            <div class="brain-layer"></div>
            <div class="brain-layer"></div>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>
    <div class="hint" id="hint">CLICK TO EXPLORE</div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        
        // ===== STATE =====
        let state = 0; // 0 = brain video, 1 = starfield
        let transitioning = false;
        
        // ===== THREE.JS SETUP =====
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.001);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
        camera.position.z = 100;
        
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        
        // ===== STARFIELd =====
        const starCount = 8000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        
        for(let i = 0; i < starCount; i++) {
            const r = 500 + Math.random() * 1000;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i*3+2] = r * Math.cos(phi);
            
            starSizes[i] = Math.random() * 2;
        }
        
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
        
        const starMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uZoom: { value: 0 } // 0 = far, 1 = close
            },
            vertexShader: `
                attribute float size;
                uniform float uTime;
                uniform float uZoom;
                varying float vAlpha;
                
                void main() {
                    vec3 pos = position;
                    
                    // Stars move toward camera when zoomed
                    if(uZoom > 0.0) {
                        pos.z -= uZoom * 800.0;
                        pos.x *= (1.0 + uZoom * 0.5);
                        pos.y *= (1.0 + uZoom * 0.5);
                    }
                    
                    // Twinkle
                    vAlpha = 0.3 + sin(uTime * 2.0 + position.x * 0.01) * 0.3;
                    
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = size * (800.0 / -mvPosition.z);
                }
            `,
            fragmentShader: `
                varying float vAlpha;
                
                void main() {
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if(dist > 0.5) discard;
                    
                    float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                    alpha *= vAlpha;
                    
                    gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const stars = new THREE.Points(starGeo, starMat);
        stars.visible = false;
        scene.add(stars);
        
        // ===== NEBULA PARTICLES =====
        const nebulaCount = 500;
        const nebulaGeo = new THREE.BufferGeometry();
        const nebulaPos = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);
        
        const colorPalette = [
            new THREE.Color(0x4a00e0),
            new THREE.Color(0x8e2de2),
            new THREE.Color(0x00d4ff),
            new THREE.Color(0xff6b9d)
        ];
        
        for(let i = 0; i < nebulaCount; i++) {
            const r = 200 + Math.random() * 400;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            nebulaPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            nebulaPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            nebulaPos[i*3+2] = r * Math.cos(phi);
            
            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            nebulaColors[i*3] = color.r;
            nebulaColors[i*3+1] = color.g;
            nebulaColors[i*3+2] = color.b;
        }
        
        nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
        nebulaGeo.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        
        const nebulaMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uZoom: { value: 0 }
            },
            vertexShader: `
                attribute vec3 color;
                uniform float uZoom;
                varying vec3 vColor;
                varying float vAlpha;
                
                void main() {
                    vColor = color;
                    
                    vec3 pos = position;
                    if(uZoom > 0.0) {
                        pos.z -= uZoom * 600.0;
                    }
                    
                    vAlpha = 0.2;
                    
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = 60.0 * (400.0 / -mvPosition.z);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;
                
                void main() {
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if(dist > 0.5) discard;
                    
                    float alpha = 1.0 - dist * 2.0;
                    alpha = pow(alpha, 2.0) * vAlpha;
                    
                    gl_FragColor = vec4(vColor, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const nebula = new THREE.Points(nebulaGeo, nebulaMat);
        nebula.visible = false;
        scene.add(nebula);
        
        // ===== VIDEO HANDLING =====
        const video = document.getElementById('brainVideo');
        const videoContainer = document.getElementById('videoContainer');
        const fallbackBrain = document.getElementById('fallbackBrain');
        const loading = document.getElementById('loading');
        
        let videoLoaded = false;
        
        video.addEventListener('loadeddata', () => {
            videoLoaded = true;
            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 500);
        });
        
        video.addEventListener('error', () => {
            // Show fallback if video fails (CORS)
            video.style.display = 'none';
            fallbackBrain.style.display = 'block';
            videoLoaded = true;
            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 500);
        });
        
        // Timeout fallback
        setTimeout(() => {
            if(!videoLoaded) {
                video.style.display = 'none';
                fallbackBrain.style.display = 'block';
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 500);
            }
        }, 2000);
        
        // ===== INTERACTION =====
        function transitionToStarfield() {
            if(transitioning || state === 1) return;
            transitioning = true;
            
            // Hide hint
            document.getElementById('hint').classList.add('hidden');
            
            // Zoom video
            videoContainer.classList.add('zoomed');
            
            // Show stars
            stars.visible = true;
            nebula.visible = true;
            
            // Animate zoom
            let zoomProgress = 0;
            const zoomDuration = 1500;
            const startTime = performance.now();
            
            function animateZoom(currentTime) {
                const elapsed = currentTime - startTime;
                zoomProgress = Math.min(elapsed / zoomDuration, 1);
                
                // Easing
                const ease = 1 - Math.pow(1 - zoomProgress, 3);
                
                starMat.uniforms.uZoom.value = ease;
                nebulaMat.uniforms.uZoom.value = ease;
                
                if(zoomProgress < 1) {
                    requestAnimationFrame(animateZoom);
                } else {
                    state = 1;
                    transitioning = false;
                }
            }
            
            requestAnimationFrame(animateZoom);
        }
        
        document.addEventListener('click', transitionToStarfield);
        document.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'Enter') {
                transitionToStarfield();
            }
        });
        
        // ===== ANIMATION LOOP =====
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            starMat.uniforms.uTime.value = time;
            nebulaMat.uniforms.uTime.value = time;
            
            if(state === 1) {
                // Rotate starfield
                stars.rotation.y += 0.0005;
                nebula.rotation.y += 0.0003;
                
                // Camera drift
                camera.position.x = Math.sin(time * 0.1) * 5;
                camera.position.y = Math.cos(time * 0.08) * 3;
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ===== RESIZE =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
